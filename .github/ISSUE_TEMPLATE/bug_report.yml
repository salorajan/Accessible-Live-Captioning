name: Bug report
description: Report a problem so we can fix it
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error messages.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open folder '...'
        2. Build master
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: ChapterForge version
      description: See Help → About, or run `chapterforge-cli --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11
    validations:
      required: true
  - type: dropdown
    id: assistive-tech
    attributes:
      label: Were you using a screen reader or other assistive technology?
      options:
        - "No"
        - "NVDA"
        - "JAWS"
        - "Narrator"
        - "Other (describe above)"
    validations:
      required: false
