name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Patch feedback token into app
        # Injects the fine-grained PAT (issues:write only) at build time.
        # The token never lives in source — only in this secret and the binary.
        env:
          CHAPTERFORGE_GITHUB_TOKEN: ${{ secrets.CHAPTERFORGE_GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import re, os, pathlib
          path = pathlib.Path("chapterforge/app.py")
          src = path.read_text(encoding="utf-8")
          token = os.environ["CHAPTERFORGE_GITHUB_TOKEN"]
          patched = re.sub(
              r'_FEEDBACK_GITHUB_TOKEN = os\.environ\.get\("CHAPTERFORGE_GITHUB_TOKEN", ""\)',
              f'_FEEDBACK_GITHUB_TOKEN = "{token}"',
              src,
          )
          path.write_text(patched, encoding="utf-8")
          print("Token injected into build.")
          EOF

      - name: Build with PyInstaller
        run: pyinstaller ChapterForge.spec -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ChapterForge-Portable.iss

      - name: Upload installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/ChapterForge-Portable.exe
